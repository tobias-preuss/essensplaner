<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Essensplaner</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
<style>
  :root {
    --bg:           #F7F7F5;
    --surface:      #FFFFFF;
    --surface-sat:  #FBF3E8;
    --surface-sun:  #FBEAEA;
    --surface-lock: #F0F0EE;
    --border:       rgba(0,0,0,0.07);
    --text:         #1A1A18;
    --text-muted:   #7A7A74;
    --text-locked:  #9A9A94;
    --accent:       #3D7F4F;
    --accent-bg:    #EAF3EC;
    --accent-text:  #2A5C37;
    --warn:         #C0541A;
    --warn-bg:      #FDF0E8;
    --locked-border:#D4A800;
    --reste-bg:     #F0EDF8;
    --reste-text:   #5B3F8A;
    --radius:       14px;
    --radius-sm:    9px;
    --tab-h:        56px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; background: var(--bg); color: var(--text); max-width: 430px; margin: 0 auto; min-height: 100vh; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }

  /* ── Tabs ─────────────────────────────────────────────────── */
  .tabs { display: flex; height: var(--tab-h); background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
  .tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; font-size: 10px; font-weight: 500; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; letter-spacing: 0.3px; transition: color 0.15s, border-color 0.15s; user-select: none; }
  .tab .icon { font-size: 20px; line-height: 1; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── Floating toast (status) ──────────────────────────────────  */
  .float-toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
    max-width: 380px; width: calc(100% - 32px);
    background: #1c1c1e; color: #fff; border-radius: 22px;
    padding: 10px 18px; display: flex; align-items: center; justify-content: center; gap: 8px;
    font-size: 13px; font-weight: 500; z-index: 400; opacity: 0;
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), opacity 0.2s;
    pointer-events: none;
  }
  .float-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .float-toast.success { background: #2A5C37; }
  .float-toast.error   { background: #8B2618; }
  .float-toast .spinner { width: 13px; height: 13px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Panel ────────────────────────────────────────────────── */
  .panel { display: none; padding: 12px 12px 90px; }
  .panel.active { display: block; }

  /* ── Buttons ──────────────────────────────────────────────── */
  .action-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .btn { flex: 1; height: 40px; border: none; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .btn:active { opacity: 0.75; }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-primary   { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
  .btn-sm { flex: 0 0 auto; height: 40px; padding: 0 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 16px; cursor: pointer; background: var(--surface); color: var(--text); }

  /* ── Week separator ───────────────────────────────────────── */
  .week-sep { font-size: 11px; font-weight: 700; color: var(--text-muted); padding: 12px 4px 6px; display: flex; align-items: baseline; gap: 6px; }
  .week-sep .range { font-weight: 500; color: var(--text-muted); opacity: 0.75; }

  /* ── Day Card ─────────────────────────────────────────────── */
  .day-wrap {
    display: flex;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    margin-bottom: 7px;
    overflow: hidden;
    background: var(--surface);
    transition: box-shadow 0.15s, background 0.15s, border-color 0.15s;
    position: relative;
  }
  .day-wrap.saturday { background: var(--surface-sat); }
  .day-wrap.sunday   { background: var(--surface-sun); }
  .day-wrap.locked   { background: var(--surface-lock) !important; border-color: var(--locked-border); }
  .day-wrap.sortable-chosen { box-shadow: 0 6px 24px rgba(0,0,0,0.13); }
  .day-wrap.sortable-ghost  { opacity: 0.25; }

  @keyframes flashGreen { 0% { background-color: #A8D5B0; } 100% { background-color: inherit; } }
  .day-wrap.flash { animation: flashGreen 1.6s ease-out forwards; }

  .drag-handle {
    width: 30px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); opacity: 0.3; font-size: 18px;
    cursor: grab; touch-action: none;
    background: rgba(0,0,0,0.015); border-right: 1px solid var(--border);
  }
  .day-wrap.locked .drag-handle { opacity: 0.12; cursor: not-allowed; pointer-events: none; }

  .day-content { flex: 1; min-width: 0; padding: 9px 11px; }

  /* Row 1: date + badges + lock + chevron */
  .row1 { display: flex; align-items: center; gap: 7px; cursor: pointer; }
  .day-name { font-size: 12px; font-weight: 600; color: var(--text-muted); }
  .day-wrap.locked .day-name { color: var(--text-locked); }
  .badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; white-space: nowrap; }
  .badge-prep  { background: #E8F4FD; color: #1A6B9A; }
  .badge-reste { background: var(--reste-bg); color: var(--reste-text); }
  .row1-actions { margin-left: auto; display: flex; align-items: center; gap: 2px; }
  .lock-icon { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; cursor: pointer; flex-shrink: 0; }
  .lock-icon svg { width: 17px; height: 17px; }
  .chevron { width: 16px; height: 16px; color: var(--text-muted); transition: transform 0.2s; flex-shrink: 0; }
  .day-wrap.expanded .chevron { transform: rotate(180deg); }

  /* Meal rows (row2 / row3 for split) */
  .meal-row { display: flex; align-items: center; gap: 6px; margin-top: 6px; min-width: 0; }
  .person-tag {
    font-size: 9px; font-weight: 700; width: 15px; height: 15px;
    border-radius: 50%; background: var(--accent-bg); color: var(--accent-text);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .meal-name-btn {
    flex: 1; min-width: 0; text-align: left; background: none; border: none; font-family: inherit;
    font-size: 14.5px; font-weight: 500; color: var(--text); cursor: pointer; padding: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .day-wrap.locked .meal-name-btn { color: var(--text-locked); }
  .meal-name-btn.placeholder { color: var(--text-muted); font-style: italic; }
  .meal-emoji { font-size: 15px; flex-shrink: 0; line-height: 1; }

  .row-actions { display: flex; align-items: center; gap: 4px; flex-shrink: 0; margin-left: auto; }
  .pill-btn {
    font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px;
    border: 1px solid var(--border); background: var(--surface); color: var(--text);
    cursor: pointer; white-space: nowrap;
  }
  .pill-btn.merge { background: var(--accent-bg); border-color: var(--accent); color: var(--accent-text); }
  .icon-btn-sm {
    width: 26px; height: 26px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    border: none; background: none; color: var(--text-muted); font-size: 15px;
    cursor: pointer; border-radius: 6px;
  }
  .icon-btn-sm:active { background: var(--border); }
  .icon-btn-sm:disabled { opacity: 0.3; cursor: not-allowed; }
  .icon-btn-sm.loading svg, .icon-btn-sm.loading { pointer-events: none; }

  /* ── Detail (expanded) ───────────────────────────────────── */
  .day-detail { max-height: 0; overflow: hidden; transition: max-height 0.25s ease; }
  .day-wrap.expanded .day-detail { max-height: 300px; }
  .detail-row { display: flex; align-items: center; gap: 10px; padding: 8px 0 0; }
  .stepper { display: flex; align-items: center; gap: 6px; flex-shrink: 0; margin-left: auto; }
  .stepper-btn { width: 24px; height: 24px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; line-height: 1; flex-shrink: 0; }
  .stepper-btn:active { background: var(--border); }
  .stepper-val { font-size: 13px; font-weight: 600; min-width: 14px; text-align: center; }
  .detail-hint { font-size: 10.5px; color: var(--text-muted); }

  /* ── Edit Modal ───────────────────────────────────────────── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 350; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal { width: 100%; max-width: 380px; background: var(--surface); border-radius: var(--radius); overflow: hidden; }
  .modal-header { padding: 18px 18px 14px; border-bottom: 1px solid var(--border); }
  .modal-title { font-size: 16px; font-weight: 700; }
  .modal-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .modal-body { padding: 14px 18px; }
  .modal-input {
    width: 100%; font-size: 15px; font-family: inherit; padding: 11px 13px;
    border: 1.5px solid var(--border); border-radius: var(--radius-sm); outline: none;
    transition: border-color 0.15s;
  }
  .modal-input:focus { border-color: var(--accent); }
  .modal-suggestions { margin-top: 10px; max-height: 220px; overflow-y: auto; }
  #add-shopping-ingredient-list { max-height: 45vh; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  #add-shopping-ingredient-list::-webkit-scrollbar { width: 6px; }
  #add-shopping-ingredient-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  #add-shopping-ingredient-list::-webkit-scrollbar-track { background: transparent; }
  .modal-suggestion-item { padding: 11px 12px; border-radius: var(--radius-sm); cursor: pointer; font-size: 14px; }
  .modal-suggestion-item:active { background: var(--bg); }
  .modal-suggestion-item .tag-line { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
  .modal-empty-hint { font-size: 12px; color: var(--text-muted); padding: 8px 2px; }
  .modal-footer { display: flex; gap: 8px; padding: 14px 18px 18px; }
  .modal-footer .btn { flex: 1; }

  /* ── Bottom Sheet ─────────────────────────────────────────── */
  .sheet-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: flex-end; }
  .sheet-overlay.open { display: flex; }
  .sheet { width: 100%; max-width: 430px; margin: 0 auto; background: var(--surface); border-radius: var(--radius) var(--radius) 0 0; padding: 20px 16px 36px; }
  .sheet-title    { font-size: 16px; font-weight: 700; margin-bottom: 6px; text-align: center; }
  .sheet-subtitle { font-size: 13px; color: var(--text-muted); text-align: center; margin-bottom: 16px; line-height: 1.45; }
  .sheet-btn { display: block; width: 100%; padding: 14px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; cursor: pointer; text-align: left; margin-bottom: 8px; }
  .sheet-btn:active { background: var(--bg); }
  .sheet-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .sheet-btn.cancel  { color: var(--text-muted); text-align: center; border-color: transparent; background: none; }

  /* ── Confirm Dialog ───────────────────────────────────────── */
  .dialog-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 300; align-items: center; justify-content: center; padding: 24px; }
  .dialog-overlay.open { display: flex; }
  .dialog { background: var(--surface); border-radius: var(--radius); padding: 24px 20px 20px; width: 100%; max-width: 340px; text-align: center; }
  .dialog-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
  .dialog-body  { font-size: 14px; color: var(--text-muted); line-height: 1.45; margin-bottom: 20px; }
  .dialog-actions { display: flex; gap: 8px; }
  .dialog-actions .btn { flex: 1; }

  /* ── Undo Toast ───────────────────────────────────────────── */
  .undo-toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(80px);
    max-width: 390px; width: calc(100% - 32px);
    background: #1c1c1e; color: #fff; border-radius: var(--radius-sm);
    padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px;
    font-size: 13px; z-index: 250; transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }
  .undo-toast.show { transform: translateX(-50%) translateY(0); }
  .undo-toast button { background: none; border: none; color: #6FCF8D; font-weight: 700; font-size: 13px; cursor: pointer; }

  /* ── Shopping & Pantry ───────────────────────────────────────── */
  .cat-header { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-muted); padding: 14px 2px 6px; }
  .shop-item { display: flex; align-items: center; background: var(--surface); border-radius: var(--radius-sm); border: 1px solid var(--border); padding: 11px 13px; margin-bottom: 6px; gap: 11px; transition: opacity 0.2s; }
  .shop-item.done { opacity: 0.38; }
  .shop-item.done .item-name { text-decoration: line-through; }
  .check { width: 24px; height: 24px; border-radius: 50%; border: 1.5px solid var(--border); flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 13px; color: white; transition: background 0.15s, border-color 0.15s; }
  .check.on { background: var(--accent); border-color: var(--accent); }
  .item-name { flex: 1; font-size: 15px; }
  .item-amount { font-size: 13px; color: var(--text-muted); font-weight: 500; white-space: nowrap; }

  .shop-group { margin-bottom: 6px; }
  .shop-group .shop-item { margin-bottom: 0; }
  .shop-item.has-sub { border-radius: var(--radius-sm) var(--radius-sm) 0 0; border-bottom: none; }
  .shop-subitem { display: flex; align-items: center; background: var(--surface); border: 1px solid var(--border); border-top: none; padding: 9px 13px 9px 28px; gap: 11px; font-size: 13.5px; color: var(--text-muted); transition: opacity 0.2s; }
  .shop-subitem:last-child { border-radius: 0 0 var(--radius-sm) var(--radius-sm); }
  .shop-subitem .check { width: 18px; height: 18px; font-size: 10px; }
  .shop-subitem.done { opacity: 0.5; }
  .shop-subitem.done .item-name { text-decoration: line-through; }

  .modal-check-row { display: flex; align-items: center; gap: 10px; padding: 9px 2px; cursor: pointer; }
  .modal-check-row .ing-name { flex: 1; font-size: 14px; }
  .modal-check-row .ing-qty { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
  .checkbox-row { display: flex; align-items: center; gap: 8px; margin-top: 14px; font-size: 13px; color: var(--text); }
  .checkbox-row input { width: 16px; height: 16px; accent-color: var(--accent); }

  .pantry-item { display: flex; align-items: center; background: var(--surface); border-radius: var(--radius-sm); border: 1px solid var(--border); padding: 12px 13px; margin-bottom: 6px; gap: 11px; }
  .pantry-info { flex: 1; }
  .pantry-name { font-size: 15px; font-weight: 500; }
  .pantry-sub  { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .status-pill { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; flex-shrink: 0; white-space: nowrap; }
  .pill-ok     { background: var(--accent-bg); color: var(--accent-text); }
  .pill-soon   { background: var(--warn-bg);   color: var(--warn); }
  .pill-needed { background: #FDECEA;           color: #8B2618; }

  .empty { text-align: center; padding: 48px 24px; color: var(--text-muted); font-size: 14px; line-height: 1.5; }
  .empty .empty-icon { font-size: 36px; margin-bottom: 12px; display: block; }
</style>
</head>
<body>

<nav class="tabs">
  <div class="tab active" data-panel="plan" onclick="switchTab(this)"><span class="icon">📅</span>Plan</div>
  <div class="tab" data-panel="shopping" onclick="switchTab(this)"><span class="icon">🛒</span>Einkauf</div>
  <div class="tab" data-panel="pantry" onclick="switchTab(this)"><span class="icon">📦</span>Vorräte</div>
</nav>

<div class="float-toast" id="float-toast">
  <span class="spinner" id="toast-spinner" style="display:none"></span>
  <span id="toast-text"></span>
</div>

<div id="panel-plan" class="panel active">
  <div class="action-row">
    <button class="btn btn-primary" onclick="askGeneratePlan()" id="btn-generate">✨ Neuer Plan</button>
    <button class="btn btn-secondary" onclick="savePlan()" id="btn-save">💾 Plan speichern</button>
  </div>
  <div id="plan-list"></div>
</div>

<div id="panel-shopping" class="panel">
  <div class="action-row">
    <button class="btn-sm" onclick="loadShoppingList()">↺</button>
    <button class="btn btn-primary" onclick="openManualAddModal()">+ Manuell hinzufügen</button>
    <button class="btn-sm" onclick="openDeleteShoppingSheet()">🗑️</button>
  </div>
  <div id="shopping-list"></div>
</div>

<div id="panel-pantry" class="panel">
  <div id="pantry-list"></div>
</div>

<div class="sheet-overlay" id="day-sheet" onclick="closeSheet(event)">
  <div class="sheet">
    <div class="sheet-title" id="sheet-title"></div>
    <div class="sheet-subtitle" id="sheet-subtitle"></div>
    <div id="sheet-buttons"></div>
  </div>
</div>

<div class="dialog-overlay" id="confirm-dialog">
  <div class="dialog">
    <div class="dialog-title">Neuen Plan erstellen?</div>
    <div class="dialog-body">Alle nicht fixierten Tage werden neu generiert. Fixierte Tage bleiben erhalten.</div>
    <div class="dialog-actions">
      <button class="btn btn-secondary" onclick="closeDialog()">Abbrechen</button>
      <button class="btn btn-primary" onclick="generatePlan()">Ja, neu erstellen</button>
    </div>
  </div>
</div>

<div class="undo-toast" id="undo-toast">
  <span id="undo-text">Reihenfolge geändert</span>
  <button onclick="undoLastChange()">Rückgängig</button>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-modal" onclick="closeEditModalOnOverlay(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Gericht eingeben</div>
      <div class="modal-subtitle" id="edit-modal-subtitle"></div>
    </div>
    <div class="modal-body">
      <input type="text" class="modal-input" id="edit-modal-input" placeholder="z.B. Pfeffernudeln">
      <div class="modal-suggestions" id="edit-modal-suggestions"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeEditModal()">Abbrechen</button>
      <button class="btn btn-primary" onclick="submitEditModal()">Übernehmen</button>
    </div>
  </div>
</div>

<!-- Zur Einkaufsliste hinzufügen -->
<div class="modal-overlay" id="add-shopping-modal" onclick="closeAddShoppingModalOnOverlay(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Zur Einkaufsliste hinzufügen</div>
      <div class="modal-subtitle" id="add-shopping-modal-subtitle"></div>
    </div>
    <div class="modal-body">
      <div id="add-shopping-ingredient-list"></div>
      <label class="checkbox-row">
        <input type="checkbox" id="add-shopping-dish-checkbox" checked>
        <span>Gericht ebenfalls hinzufügen</span>
      </label>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeAddShoppingModal()">Abbrechen</button>
      <button class="btn btn-primary" onclick="submitAddShoppingModal()">Hinzufügen</button>
    </div>
  </div>
</div>

<!-- Manuell hinzufügen -->
<div class="modal-overlay" id="manual-add-modal" onclick="closeManualAddModalOnOverlay(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Manuell hinzufügen</div>
    </div>
    <div class="modal-body">
      <input type="text" class="modal-input" id="manual-add-name" placeholder="z.B. Zwiebeln">
      <div class="modal-suggestions" id="manual-add-suggestions"></div>
      <div class="detail-row" style="padding-top:14px">
        <span class="detail-hint">Menge (Stk, optional)</span>
        <div class="stepper">
          <button class="stepper-btn" onclick="changeManualAddQty(-1)">−</button>
          <span class="stepper-val" id="manual-add-qty">0</span>
          <button class="stepper-btn" onclick="changeManualAddQty(1)">+</button>
        </div>
      </div>
      <input type="text" class="modal-input" id="manual-add-category" placeholder="Kategorie (z.B. Gemüse)" style="margin-top:12px">
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeManualAddModal()">Abbrechen</button>
      <button class="btn btn-primary" onclick="submitManualAddModal()">Hinzufügen</button>
    </div>
  </div>
</div>

<!-- Einkaufsliste löschen -->
<div class="sheet-overlay" id="delete-shopping-sheet" onclick="closeDeleteShoppingSheet(event)">
  <div class="sheet">
    <div class="sheet-title">Einkaufsliste löschen</div>
    <div class="sheet-subtitle">Was soll gelöscht werden?</div>
    <button class="sheet-btn" onclick="submitDeleteShopping('done')">Nur Erledigte löschen</button>
    <button class="sheet-btn" onclick="submitDeleteShopping('all')">Gesamte Liste löschen</button>
    <button class="sheet-btn cancel" onclick="closeDeleteShoppingSheet()">Abbrechen</button>
  </div>
</div>

<script>
const tg        = window.Telegram?.WebApp;
const API_URL   = "https://script.google.com/macros/s/AKfycby7ctVegsR8rC8CZMWS5iEOvEMORyVFvnPJOQXp1BdreB4tgn4TPRLyqqDYE87PqdqjZg/exec";
const INIT_DATA = tg?.initData || "";
if (tg) { tg.ready(); tg.expand(); }

const DAYS_FULL  = ["Sonntag","Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag"];
const DAYS_SHORT = ["So","Mo","Di","Mi","Do","Fr","Sa"];

const TAG_EMOJI = {
  "fleisch":       "🍗",
  "nudeln":        "🍝",
  "reis":          "🍚",
  "kartoffeln":    "🥔",
  "vegetarisch":   "🥦",
  "vegan":         "🌱",
};
function emojiForTags(tags) {
  if (!tags || !tags.length) return "🍽️";
  const first = tags[0].toLowerCase();
  return TAG_EMOJI[first] || "🍽️";
}

// ── State ──────────────────────────────────────────────────────
let mealPlan       = [];
let dateSlots      = [];
let lockedDays     = new Set();
let shoppingItems  = [];
let pantryItems    = [];
let recipes        = [];
let expandedIdx    = null;
let undoSnapshot   = null;
let undoTimer      = null;
let regeneratingKeys = new Set(); // z.B. "3" oder "3-tobi" während Ladevorgang

// Edit-Modal state
let editModalCtx = null; // { idx, person }

// Add-Shopping-Modal state
let addShoppingCtx = null; // { idx, person, recipeId, portions, ingredients: [{name, unit, scaledQty, checked}] }
let manualAddQty = 0;

// Findet das DB-Rezept zu einem Tages-Gericht (für den 🛒-Button).
// Bei Split-Tagen gibt es keine recipeId pro Seite, nur Freitext -> per Namen matchen
// (analog zur bisherigen Server-Logik für Split-Zutaten).
function findRecipeForDay(day, person) {
  if (!person) {
    if (!day.recipeId) return null;
    return recipes.find(r => String(r.id) === String(day.recipeId)) || null;
  }
  const name = person === "tobi" ? day.customNameTobi : day.customNameNora;
  if (!name) return null;
  return recipes.find(r => r.name.trim().toLowerCase() === name.trim().toLowerCase()) || null;
}

// ── API ────────────────────────────────────────────────────────
async function apiCall(action, extraParams = {}) {
  const initDataEncoded = INIT_DATA ? btoa(unescape(encodeURIComponent(INIT_DATA))) : "";
  const params = new URLSearchParams({ action, initData: initDataEncoded, ...extraParams });
  const res    = await fetch(`${API_URL}?${params.toString()}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

// ── Floating Toast (kein Layout-Shift) ──────────────────────────
let toastTimer = null;
function showToast(msg, type = "loading", autoHideMs = null) {
  const toast = document.getElementById("float-toast");
  toast.className = `float-toast show ${type}`;
  document.getElementById("toast-text").textContent = msg;
  document.getElementById("toast-spinner").style.display = type === "loading" ? "inline-block" : "none";
  clearTimeout(toastTimer);
  if (autoHideMs) toastTimer = setTimeout(() => hideToast(), autoHideMs);
}
function hideToast() {
  document.getElementById("float-toast").className = "float-toast";
}
function showSuccess(msg) { showToast(msg, "success", 1800); }
function showError(msg)   { showToast(msg, "error", 2800); }

// ── Lock SVG ───────────────────────────────────────────────────
function lockSvg(locked) {
  return locked
    ? `<svg viewBox="0 0 24 24" fill="none" stroke="#D4A800" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
         <rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/>
       </svg>`
    : `<svg viewBox="0 0 24 24" fill="none" stroke="#9A9A94" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
         <rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 7.75-1"/><line x1="16" y1="5" x2="19.5" y2="2.5"/>
       </svg>`;
}
const CHEVRON_SVG = `<svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>`;
const REGEN_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>`;
const SPIN_SVG = `<svg viewBox="0 0 24 24" width="15" height="15" style="animation:spin 0.7s linear infinite"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2.5" stroke-dasharray="40 100" stroke-linecap="round"/></svg>`;

// ── Date helpers ─────────────────────────────────────────────────
function getISOWeek(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}
function fmtShort(date) { return `${String(date.getDate()).padStart(2,"0")}.${String(date.getMonth()+1).padStart(2,"0")}`; }

// ── Plan laden ─────────────────────────────────────────────────
async function loadPlan() {
  showToast("Lade Essensplan...");
  try {
    const [planData, recipeData] = await Promise.all([apiCall("getMealPlan"), apiCall("getRecipes")]);
    mealPlan = planData.mealPlan || [];
    recipes  = recipeData.recipes || [];
    if (dateSlots.length === 0) dateSlots = mealPlan.map(d => ({ date: d.date, dayOfWeek: d.dayOfWeek }));
    // Lock-Zustand aus Sheets laden
    lockedDays = new Set(mealPlan.map((d,i) => d.isLocked ? i : -1).filter(i => i >= 0));
    renderPlan();
    hideToast();
  } catch (err) {
    showError("Plan konnte nicht geladen werden.");
    console.error(err);
  }
}

function askGeneratePlan() { document.getElementById("confirm-dialog").classList.add("open"); }
function closeDialog()     { document.getElementById("confirm-dialog").classList.remove("open"); }

// ── Meal name display inkl. Lade-State ─────────────────────────
function getMealDisplayName(idx, person, day) {
  const key = person ? `${idx}-${person}` : `${idx}`;
  if (regeneratingKeys.has(key)) return null; // null = zeigt Lade-Indikator
  if (person === "tobi") return day.customNameTobi;
  if (person === "nora") return day.customNameNora;
  return day.recipeName;
}

async function generatePlan() {
  closeDialog();
  document.getElementById("btn-generate").disabled = true;
  showToast("Erstelle neuen Plan...");
  try {
    // Gelockte Indizes an API übergeben damit sie nicht überschrieben werden
    await apiCall("generatePlan", { lockedIndices: [...lockedDays].join(",") });
    const planData = await apiCall("getMealPlan");
    const newPlan  = planData.mealPlan || [];

    // Gelockte Tage aus altem Plan beibehalten
    lockedDays.forEach(lockedIdx => {
      if (mealPlan[lockedIdx] && newPlan[lockedIdx]) {
        newPlan[lockedIdx] = mealPlan[lockedIdx];
      }
    });

    mealPlan  = newPlan;
    dateSlots = planData.mealPlan.map(d => ({ date: d.date, dayOfWeek: d.dayOfWeek }));
    renderPlan();
    showSuccess("Neuer Plan erstellt ✓");
  } catch (err) {
    showError("Plan konnte nicht erstellt werden.");
    console.error(err);
  } finally {
    document.getElementById("btn-generate").disabled = false;
  }
}

async function regenerateDay(idx, person) {
  const key = person ? `${idx}-${person}` : `${idx}`;
  regeneratingKeys.add(key);
  renderPlan(); // zeigt Ladeindikator im Namen
  showToast("Generiere Gericht...");

  try {
    const params = { index: idx };
    if (person) params.person = person;
    const data = await apiCall("regenerateSingleDay", params);

    // Ergebnis korrekt in State schreiben
    const updated = data.day || {};
    if (person === "tobi") {
      mealPlan[idx].customNameTobi = updated.recipeName || updated.customNameTobi || "";
    } else if (person === "nora") {
      mealPlan[idx].customNameNora = updated.recipeName || updated.customNameNora || "";
    } else {
      mealPlan[idx] = { ...mealPlan[idx], ...updated };
    }

    regeneratingKeys.delete(key);
    renderPlan();

    const card = document.getElementById(`day-wrap-${idx}`);
    if (card) {
      card.classList.remove("flash"); void card.offsetWidth;
      card.classList.add("flash");
      setTimeout(() => card.classList.remove("flash"), 1800);
    }
    showSuccess("Gericht aktualisiert ✓");
  } catch (err) {
    regeneratingKeys.delete(key);
    renderPlan();
    showError("Konnte Gericht nicht ändern.");
    console.error(err);
  }
}

// ── Zur Einkaufsliste hinzufügen (🛒-Popup) ─────────────────────
function openAddToShoppingModal(idx, person, recipeId, portions) {
  const recipe = recipes.find(r => String(r.id) === String(recipeId));
  if (!recipe || !recipe.ingredients) return;

  addShoppingCtx = {
    idx, person, recipeId, portions,
    ingredients: recipe.ingredients.map(ing => ({
      name: ing.name,
      unit: ing.unit,
      scaledQty: (ing.amount === null || ing.amount === undefined) ? null : Math.round(ing.amount * portions * 10) / 10,
      checked: !ing.optional,
    })),
  };

  const day = mealPlan[idx];
  const slot = dateSlots[idx] || {};
  const date = new Date(slot.date || day.date);
  const label = `${DAYS_FULL[slot.dayOfWeek ?? day.dayOfWeek]}, ${fmtShort(date)} · ${recipe.name}`;
  document.getElementById("add-shopping-modal-subtitle").textContent = label;
  document.getElementById("add-shopping-dish-checkbox").checked = true;
  renderAddShoppingIngredientList();
  document.getElementById("add-shopping-modal").classList.add("open");
}

function renderAddShoppingIngredientList() {
  const box = document.getElementById("add-shopping-ingredient-list");
  box.innerHTML = "";
  addShoppingCtx.ingredients.forEach(ing => {
    const qtyLabel = ing.scaledQty !== null ? `${ing.scaledQty}${ing.unit ? " " + ing.unit : ""}` : "";
    const row = document.createElement("div");
    row.className = "modal-check-row";
    row.innerHTML = `
      <div class="check ${ing.checked ? "on" : ""}">${ing.checked ? "✓" : ""}</div>
      <span class="ing-name">${ing.name}</span>
      <span class="ing-qty">${qtyLabel}</span>`;
    row.onclick = () => { ing.checked = !ing.checked; renderAddShoppingIngredientList(); };
    box.appendChild(row);
  });
}

function closeAddShoppingModal() {
  document.getElementById("add-shopping-modal").classList.remove("open");
  addShoppingCtx = null;
}
function closeAddShoppingModalOnOverlay(e) {
  if (e.target === document.getElementById("add-shopping-modal")) closeAddShoppingModal();
}

async function submitAddShoppingModal() {
  const ctx = addShoppingCtx;
  if (!ctx) return;
  const selectedNames = ctx.ingredients.filter(ing => ing.checked).map(ing => ing.name);
  const addDishEntry  = document.getElementById("add-shopping-dish-checkbox").checked;
  closeAddShoppingModal();
  if (!selectedNames.length) return;

  showToast("Füge zur Einkaufsliste hinzu...");
  try {
    const data = await apiCall("addDishToShoppingList", {
      recipeId:            ctx.recipeId,
      portions:             ctx.portions,
      selectedIngredients: JSON.stringify(selectedNames),
      addDishEntry:         addDishEntry ? "true" : "false",
    });
    shoppingItems = data.items || [];
    renderShoppingV2();
    showSuccess("Zur Einkaufsliste hinzugefügt ✓");
  } catch (err) {
    showError("Konnte nicht hinzugefügt werden.");
    console.error(err);
  }
}

// ── Manuell hinzufügen (Popup) ──────────────────────────────────
function openManualAddModal() {
  manualAddQty = 0;
  document.getElementById("manual-add-name").value = "";
  document.getElementById("manual-add-category").value = "";
  document.getElementById("manual-add-qty").textContent = "0";
  document.getElementById("manual-add-suggestions").innerHTML = "";
  document.getElementById("manual-add-modal").classList.add("open");

  const input = document.getElementById("manual-add-name");
  setTimeout(() => input.focus(), 50);
  input.oninput = () => renderManualAddSuggestions(input.value);
}
function closeManualAddModal() { document.getElementById("manual-add-modal").classList.remove("open"); }
function closeManualAddModalOnOverlay(e) {
  if (e.target === document.getElementById("manual-add-modal")) closeManualAddModal();
}
function changeManualAddQty(delta) {
  manualAddQty = Math.max(0, manualAddQty + delta);
  document.getElementById("manual-add-qty").textContent = manualAddQty;
}

// Sammelt alle bekannten Zutatennamen aus der Rezept-DB (dedupliziert) für die Autocomplete.
function getKnownIngredients() {
  const byName = new Map();
  recipes.forEach(r => (r.ingredients || []).forEach(ing => {
    if (!byName.has(ing.name)) byName.set(ing.name, ing.category || "Sonstiges");
  }));
  return byName;
}

function renderManualAddSuggestions(query) {
  const box = document.getElementById("manual-add-suggestions");
  box.innerHTML = "";
  if (!query.trim()) return;
  const known = getKnownIngredients();
  const matches = Array.from(known.entries())
    .filter(([name]) => name.toLowerCase().includes(query.toLowerCase()))
    .slice(0, 6);
  matches.forEach(([name, category]) => {
    const item = document.createElement("div");
    item.className = "modal-suggestion-item";
    item.innerHTML = `${name}<div class="tag-line">${category}</div>`;
    item.onclick = () => {
      document.getElementById("manual-add-name").value = name;
      document.getElementById("manual-add-category").value = category;
      box.innerHTML = "";
    };
    box.appendChild(item);
  });
}

async function submitManualAddModal() {
  const name = document.getElementById("manual-add-name").value.trim();
  if (!name) { closeManualAddModal(); return; }
  const category = document.getElementById("manual-add-category").value.trim() || "Sonstiges";
  const qty = manualAddQty > 0 ? manualAddQty : null;
  closeManualAddModal();

  showToast("Füge hinzu...");
  try {
    const params = { name, category };
    if (qty !== null) { params.qty = qty; params.unit = "Stk"; }
    const data = await apiCall("addManualItem", params);
    shoppingItems = data.items || [];
    renderShoppingV2();
    showSuccess("Hinzugefügt ✓");
  } catch (err) {
    showError("Konnte nicht hinzugefügt werden.");
    console.error(err);
  }
}

// ── Einkaufsliste löschen (Popup) ────────────────────────────────
function openDeleteShoppingSheet() { document.getElementById("delete-shopping-sheet").classList.add("open"); }
function closeDeleteShoppingSheet(event) {
  if (event && event.target !== document.getElementById("delete-shopping-sheet")) return;
  document.getElementById("delete-shopping-sheet").classList.remove("open");
}
async function submitDeleteShopping(mode) {
  closeDeleteShoppingSheet();
  showToast("Lösche...");
  try {
    const data = await apiCall("deleteShoppingItems", { mode });
    shoppingItems = data.items || [];
    renderShoppingV2();
    showSuccess("Gelöscht ✓");
  } catch (err) {
    showError("Konnte nicht gelöscht werden.");
    console.error(err);
  }
}

// ── Plan rendern ───────────────────────────────────────────────
function renderPlan() {
  const container = document.getElementById("plan-list");
  container.innerHTML = "";

  if (!mealPlan.length) {
    container.innerHTML = `<div class="empty"><span class="empty-icon">🍽️</span>Noch kein Plan vorhanden.<br>Tippe auf „Neuer Plan" um zu starten.</div>`;
    return;
  }

  let lastWeek = null;
  mealPlan.forEach((day, idx) => {
    const slot = dateSlots[idx] || { date: day.date, dayOfWeek: day.dayOfWeek };
    const date = new Date(slot.date);
    const week = getISOWeek(date);

    if (week !== lastWeek) {
      lastWeek = week;
      let lastIdxOfWeek = idx;
      for (let i = idx; i < mealPlan.length; i++) {
        if (getISOWeek(new Date(dateSlots[i]?.date || mealPlan[i].date)) === week) lastIdxOfWeek = i;
      }
      const lastDate = new Date(dateSlots[lastIdxOfWeek]?.date || mealPlan[lastIdxOfWeek].date);
      const sep = document.createElement("div");
      sep.className = "week-sep";
      sep.innerHTML = `<span>KW ${week}</span><span class="range">${fmtShort(date)}–${fmtShort(lastDate)}</span>`;
      container.appendChild(sep);
    }

    container.appendChild(buildDayCard(day, idx, slot));
  });

  setupSortable(container);
}

// ── Day Card bauen ─────────────────────────────────────────────
function buildDayCard(day, idx, slot) {
  const date = new Date(slot.date);
  const dow  = slot.dayOfWeek;
  const isLocked = lockedDays.has(idx);
  const isExpanded = expandedIdx === idx;

  let dayClass = "";
  if (dow === 6) dayClass = "saturday";
  if (dow === 0) dayClass = "sunday";

  const wrap = document.createElement("div");
  wrap.className = `day-wrap ${dayClass} ${isLocked ? "locked" : ""} ${isExpanded ? "expanded" : ""}`.trim();
  wrap.dataset.idx = idx;
  wrap.id = `day-wrap-${idx}`;

  let badgeHtml = "";
  if (!day.isSplit) {
    if (day.isMealPrep) badgeHtml = `<span class="badge badge-prep">Meal Prep</span>`;
    else if (day.isReste) badgeHtml = `<span class="badge badge-reste">Reste</span>`;
  }

  const row1 = `
    <div class="row1" onclick="toggleExpand(${idx})">
      <span class="day-name">${DAYS_SHORT[dow]} ${fmtShort(date)}</span>
      ${badgeHtml}
      <div class="row1-actions">
        <span class="lock-icon" onclick="event.stopPropagation(); toggleLock(${idx})">${lockSvg(isLocked)}</span>
        ${CHEVRON_SVG}
      </div>
    </div>`;

  let mealRowsHtml = "";
  if (day.isSplit) {
    mealRowsHtml = buildMealRow(idx, "tobi", day.customNameTobi, day, isLocked, isExpanded, true)
                 + buildMealRow(idx, "nora", day.customNameNora, day, isLocked, isExpanded, false);
  } else {
    mealRowsHtml = buildMealRow(idx, null, day.recipeName, day, isLocked, isExpanded, true);
  }

  let detailHtml = "";
  if (isExpanded) {
    detailHtml = `<div class="day-detail" style="max-height:300px">${buildDetailContent(day, idx)}</div>`;
  } else {
    detailHtml = `<div class="day-detail"></div>`;
  }

  wrap.innerHTML = `
    <div class="drag-handle" data-idx="${idx}">⠿</div>
    <div class="day-content">
      ${row1}
      ${mealRowsHtml}
      ${detailHtml}
    </div>`;

  return wrap;
}

// ── Eine Gericht-Zeile bauen (Row 2 / Row 3) ───────────────────
function buildMealRow(idx, person, name, day, isLocked, isExpanded, showSplitButton) {
  const key = person ? `${idx}-${person}` : `${idx}`;
  const isRegenerating = regeneratingKeys.has(key);
  const emoji = emojiForTags(day.recipeTags);

  let nameHtml;
  if (isRegenerating) {
    // Grüner Ladeindikator statt Gerichtname
    nameHtml = `<span style="flex:1;min-width:0;font-size:13.5px;font-weight:500;color:var(--accent);display:flex;align-items:center;gap:5px;">
      <svg style="width:12px;height:12px;animation:spin 0.7s linear infinite;flex-shrink:0" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2.5" stroke-dasharray="40 100" stroke-linecap="round"/></svg>
      Generiere...
    </span>`;
  } else {
    const displayName = name || "Gericht wählen...";
    const nameClass = name ? "meal-name-btn" : "meal-name-btn placeholder";
    const personParam = person ? `'${person}'` : "null";
    nameHtml = `<button class="${nameClass}" onclick="event.stopPropagation(); openEditModal(${idx}, ${personParam})">${displayName}</button>`;
  }

  const personTag = person ? `<span class="person-tag">${person === "tobi" ? "T" : "N"}</span>` : "";

  let actionHtml = "";
  if (showSplitButton && !isRegenerating) {
    const splitBtn = day.isSplit
      ? `<button class="pill-btn merge" onclick="event.stopPropagation(); toggleSplit(${idx})">Merge</button>`
      : `<button class="pill-btn" onclick="event.stopPropagation(); toggleSplit(${idx})">Split</button>`;
    actionHtml = splitBtn;
  }

  const regenIcon = isRegenerating ? "" : REGEN_SVG;
  const regenDisabled = (isLocked || isRegenerating) ? "disabled" : "";
  const personParam = person ? `'${person}'` : "null";
  const regenOnClick = (isLocked || isRegenerating) ? "" : `onclick="event.stopPropagation(); regenerateDay(${idx}, ${personParam})"`;

  // 🛒-Button: nur wenn das Gericht als DB-Rezept erkennbar ist (Zutaten bekannt)
  const matchedRecipe = isRegenerating ? null : findRecipeForDay(day, person);
  let cartBtn = "";
  if (matchedRecipe) {
    const rowPortions = person === "tobi" ? day.portionsTobi : person === "nora" ? day.portionsNora : day.portions;
    cartBtn = `<button class="icon-btn-sm" onclick="event.stopPropagation(); openAddToShoppingModal(${idx}, ${personParam}, '${matchedRecipe.id}', ${rowPortions})" title="Zur Einkaufsliste">🛒</button>`;
  }

  return `
    <div class="meal-row">
      ${personTag}
      ${nameHtml}
      <div class="row-actions">
        ${!isRegenerating && name ? `<span class="meal-emoji">${emoji}</span>` : ""}
        ${actionHtml}
        ${cartBtn}
        <button class="icon-btn-sm" ${regenDisabled} ${regenOnClick} title="Neu generieren">${regenIcon}</button>
      </div>
    </div>`;
}

// ── Detail-Bereich (aufgeklappt) ────────────────────────────────
function buildDetailContent(day, idx) {
  if (day.isSplit) {
    return `
      <div class="detail-row">
        <span class="detail-hint">Portionen Tobi</span>
        <div class="stepper">
          <button class="stepper-btn" onclick="changePersonPax(${idx},'tobi',-1)">−</button>
          <span class="stepper-val" id="pax-${idx}-tobi">${day.portionsTobi}</span>
          <button class="stepper-btn" onclick="changePersonPax(${idx},'tobi',1)">+</button>
        </div>
      </div>
      <div class="detail-row">
        <span class="detail-hint">Portionen Nora</span>
        <div class="stepper">
          <button class="stepper-btn" onclick="changePersonPax(${idx},'nora',-1)">−</button>
          <span class="stepper-val" id="pax-${idx}-nora">${day.portionsNora}</span>
          <button class="stepper-btn" onclick="changePersonPax(${idx},'nora',1)">+</button>
        </div>
      </div>`;
  }

  return `
    <div class="detail-row">
      <span class="detail-hint">${day.portions===0?'Reste (0 Portionen)':day.portions>2?'Meal-Prep Portionen':'Portionen'}</span>
      <div class="stepper">
        <button class="stepper-btn" onclick="changePax(${idx},-1)">−</button>
        <span class="stepper-val" id="pax-${idx}">${day.portions}</span>
        <button class="stepper-btn" onclick="changePax(${idx},1)">+</button>
      </div>
    </div>`;
}

// ── Expand / Collapse ────────────────────────────────────────────
function toggleExpand(idx) {
  expandedIdx = expandedIdx === idx ? null : idx;
  renderPlan();
}

// ── Edit Modal ─────────────────────────────────────────────────
function openEditModal(idx, person) {
  if (lockedDays.has(idx)) return;
  editModalCtx = { idx, person };

  const day = mealPlan[idx];
  const currentName = person === "tobi" ? day.customNameTobi : person === "nora" ? day.customNameNora : day.recipeName;
  const slot  = dateSlots[idx] || {};
  const date  = new Date(slot.date || day.date);
  const label = `${DAYS_FULL[slot.dayOfWeek ?? day.dayOfWeek]}, ${fmtShort(date)}${person ? ` · ${person === "tobi" ? "Tobi" : "Nora"}` : ""}`;

  document.getElementById("edit-modal-subtitle").textContent = label;
  const input = document.getElementById("edit-modal-input");
  input.value = currentName || "";
  document.getElementById("edit-modal-suggestions").innerHTML = "";

  document.getElementById("edit-modal").classList.add("open");
  setTimeout(() => { input.focus(); input.select(); renderModalSuggestions(input.value); }, 50);

  input.oninput = () => renderModalSuggestions(input.value);
  input.onkeydown = (e) => { if (e.key === "Enter") submitEditModal(); if (e.key === "Escape") closeEditModal(); };
}

function renderModalSuggestions(query) {
  const box = document.getElementById("edit-modal-suggestions");
  box.innerHTML = "";
  if (!query.trim()) return;
  const matches = recipes.filter(r => r.name.toLowerCase().includes(query.toLowerCase())).slice(0, 6);
  if (matches.length === 0) {
    box.innerHTML = `<div class="modal-empty-hint">Kein Treffer in der Datenbank — wird als freier Text übernommen.</div>`;
    return;
  }
  matches.forEach(r => {
    const item = document.createElement("div");
    item.className = "modal-suggestion-item";
    item.innerHTML = `${emojiForTags(r.tags)} ${r.name}<div class="tag-line">${(r.tags||[]).join(", ")}</div>`;
    item.onclick = () => { document.getElementById("edit-modal-input").value = r.name; submitEditModal(r.id); };
    box.appendChild(item);
  });
}

function closeEditModal() {
  document.getElementById("edit-modal").classList.remove("open");
  editModalCtx = null;
}
function closeEditModalOnOverlay(e) {
  if (e.target === document.getElementById("edit-modal")) closeEditModal();
}

async function submitEditModal(recipeId) {
  const name = document.getElementById("edit-modal-input").value.trim();
  const ctx  = editModalCtx;
  closeEditModal();
  if (!ctx || !name) return;

  // Optimistic UI: sofort lokal updaten
  const day = mealPlan[ctx.idx];
  if (ctx.person === "tobi") day.customNameTobi = name;
  else if (ctx.person === "nora") day.customNameNora = name;
  else { day.recipeName = name; day.isCustomName = !recipeId; }
  renderPlan();
  showToast("Speichere...");

  try {
    const params = { index: ctx.idx, customName: name };
    if (recipeId) params.recipeId = recipeId;
    if (ctx.person) params.person = ctx.person;
    const data = await apiCall("setMealForDay", params);
    mealPlan[ctx.idx] = { ...mealPlan[ctx.idx], ...data.day };
    renderPlan();
    showSuccess("Gespeichert ✓");
  } catch (err) {
    showError("Konnte nicht speichern.");
    console.error(err);
  }
}

// ── Split Toggle (optimistic) ────────────────────────────────────
async function toggleSplit(idx) {
  const day = mealPlan[idx];

  // Optimistic lokale Vorschau
  if (!day.isSplit) {
    day.isSplit = true;
    day.customNameTobi = day.recipeName || "";
    day.customNameNora = "";
    day.portionsTobi = 1;
    day.portionsNora = 1;
  } else {
    day.isSplit = false;
    day.recipeName = day.customNameTobi;
    day.isCustomName = true;
    day.portions = (day.portionsTobi||1) + (day.portionsNora||1);
  }
  renderPlan();
  showToast("Speichere...");

  try {
    const data = await apiCall("toggleSplit", { index: idx });
    mealPlan[idx] = { ...mealPlan[idx], ...data.day };
    renderPlan();
    showSuccess("Aktualisiert ✓");
  } catch (err) {
    showError("Konnte nicht ändern.");
    console.error(err);
  }
}

// ── Stepper (optimistic) ─────────────────────────────────────────
async function changePax(idx, delta) {
  const newVal = Math.max(0, mealPlan[idx].portions + delta);
  mealPlan[idx].portions = newVal;
  mealPlan[idx].isMealPrep = newVal > 2;
  mealPlan[idx].isReste = newVal === 0;
  document.getElementById(`pax-${idx}`).textContent = newVal;
  renderPlan();
  try {
    const data = await apiCall("setPortions", { index: idx, value: newVal });
    mealPlan[idx] = { ...mealPlan[idx], ...data.day };
  } catch (err) { console.error(err); showError("Konnte nicht speichern."); }
}

async function changePersonPax(idx, person, delta) {
  const key = person === "tobi" ? "portionsTobi" : "portionsNora";
  const newVal = Math.max(1, mealPlan[idx][key] + delta);
  mealPlan[idx][key] = newVal;
  document.getElementById(`pax-${idx}-${person}`).textContent = newVal;
  try {
    await apiCall("setPortions", { index: idx, person, value: newVal });
  } catch (err) { console.error(err); showError("Konnte nicht speichern."); }
}

// ── Sortable mit Lock + Undo ─────────────────────────────────────
function setupSortable(container) {
  if (window._sortable) window._sortable.destroy();

  window._sortable = new Sortable(container, {
    animation:   200,
    handle:      ".drag-handle",
    draggable:   ".day-wrap",
    ghostClass:  "sortable-ghost",
    chosenClass: "sortable-chosen",

    onStart(evt) {
      const idx = parseInt(evt.item.dataset.idx, 10);
      if (lockedDays.has(idx)) { evt.preventDefault(); return false; }
    },
    onMove(evt) {
      const draggedIdx = parseInt(evt.dragged.dataset.idx, 10);
      const targetIdx  = parseInt(evt.related?.dataset.idx ?? "-1", 10);
      if (lockedDays.has(draggedIdx)) return false;
      if (targetIdx >= 0 && lockedDays.has(targetIdx)) return false;
      return true;
    },
    onEnd(evt) {
      // evt.oldIndex/newIndex zählen auch .week-sep-Trenner mit, da SortableJS sie
      // für die Indexberechnung nicht ausschließt (nur "draggable" bestimmt, was gezogen
      // werden kann). Indizes daher selbst aus dataset.idx + tatsächlicher DOM-Position
      // der .day-wrap-Elemente ableiten, damit sie zu mealPlan[] passen.
      const oldIdx = parseInt(evt.item.dataset.idx, 10);
      const newIdx = Array.from(container.querySelectorAll(".day-wrap")).indexOf(evt.item);
      if (oldIdx === newIdx) return;
      if (lockedDays.has(newIdx)) { renderPlan(); return; }

      undoSnapshot = JSON.parse(JSON.stringify(mealPlan));
      const moved = mealPlan.splice(oldIdx, 1)[0];
      mealPlan.splice(newIdx, 0, moved);

      const newLocked = new Set();
      lockedDays.forEach(i => {
        let adj = i;
        if (oldIdx < newIdx) { if (i > oldIdx && i <= newIdx) adj = i - 1; }
        else                 { if (i >= newIdx && i < oldIdx) adj = i + 1; }
        newLocked.add(adj);
      });
      lockedDays = newLocked;
      expandedIdx = null;
      renderPlan();
      showUndoToast("Reihenfolge geändert");
      savePlanOrder();
    },
  });
}

function showUndoToast(text) {
  document.getElementById("undo-text").textContent = text;
  const toast = document.getElementById("undo-toast");
  toast.classList.add("show");
  clearTimeout(undoTimer);
  undoTimer = setTimeout(() => { toast.classList.remove("show"); undoSnapshot = null; }, 4000);
}
async function undoLastChange() {
  if (!undoSnapshot) return;
  mealPlan = undoSnapshot; undoSnapshot = null;
  document.getElementById("undo-toast").classList.remove("show");
  clearTimeout(undoTimer);
  renderPlan();
  await savePlanOrder();
  showSuccess("Rückgängig gemacht ✓");
}

async function savePlanOrder() {
  try {
    const order = mealPlan.map(day => ({
      recipeId: day.recipeId, recipeName: day.recipeName, isCustomName: day.isCustomName,
      portions: day.portions, note: day.note || "",
      isSplit: day.isSplit || false, customNameTobi: day.customNameTobi || "", customNameNora: day.customNameNora || "",
      portionsTobi: day.portionsTobi, portionsNora: day.portionsNora,
    }));
    await apiCall("updateMealOrder", { order: JSON.stringify(order) });
  } catch (err) { showError("Reihenfolge konnte nicht gespeichert werden."); console.error(err); }
}

async function toggleLock(idx) {
  // Optimistic update
  if (lockedDays.has(idx)) lockedDays.delete(idx); else lockedDays.add(idx);
  // isLocked im lokalen State updaten
  if (mealPlan[idx]) mealPlan[idx].isLocked = lockedDays.has(idx);
  renderPlan();
  // Im Hintergrund in Sheets persistieren
  try {
    await apiCall("toggleLock", { index: idx });
  } catch (err) {
    // Rollback bei Fehler
    if (lockedDays.has(idx)) lockedDays.delete(idx); else lockedDays.add(idx);
    if (mealPlan[idx]) mealPlan[idx].isLocked = lockedDays.has(idx);
    renderPlan();
    showError("Lock konnte nicht gespeichert werden.");
    console.error(err);
  }
}

// ── Swipe: links=regenerieren (auch gelockt erlaubt für ganzen Tag), rechts=lock ──
let swipeStartX = null, swipeStartY = null, swipeIdx = null;
document.addEventListener("touchstart", (e) => {
  const wrap = e.target.closest(".day-wrap");
  if (!wrap || e.target.closest(".drag-handle")) return;
  swipeStartX = e.touches[0].clientX; swipeStartY = e.touches[0].clientY;
  swipeIdx = parseInt(wrap.dataset.idx, 10);
}, { passive: true });
document.addEventListener("touchend", (e) => {
  if (swipeStartX === null || swipeIdx === null) return;
  const dx = e.changedTouches[0].clientX - swipeStartX;
  const dy = e.changedTouches[0].clientY - swipeStartY;
  if (Math.abs(dx) > 70 && Math.abs(dy) < 50) {
    if (dx < 0) openDaySheet(swipeIdx); else toggleLock(swipeIdx);
  }
  swipeStartX = swipeStartY = swipeIdx = null;
}, { passive: true });

// ── Bottom Sheet: Neu generieren (funktioniert auch gelockt) ────
function openDaySheet(idx) {
  const day = mealPlan[idx];
  const slot = dateSlots[idx] || {};
  const date = new Date(slot.date || day.date);
  const label = `${DAYS_FULL[slot.dayOfWeek ?? day.dayOfWeek]}, ${fmtShort(date)}`;

  document.getElementById("sheet-title").textContent = label;
  document.getElementById("sheet-subtitle").textContent = "Diesen Tag mit einem neuen Gericht belegen?";
  document.getElementById("sheet-buttons").innerHTML = `
    <button class="sheet-btn primary" onclick="regenerateDay(${idx}, null); closeSheet()">
      Tag neu generieren
    </button>
    <button class="sheet-btn cancel" onclick="closeSheet()">Abbrechen</button>`;
  document.getElementById("day-sheet").classList.add("open");
}
function closeSheet(event) {
  if (event && event.target !== document.getElementById("day-sheet")) return;
  document.getElementById("day-sheet").classList.remove("open");
}

// ── Plan Speichern ─────────────────────────────────────────────
async function savePlan() {
  const btn = document.getElementById('btn-save');
  if (btn) btn.disabled = true;
  showToast('Speichere Plan...');
  try {
    const order = mealPlan.map(day => ({
      recipeId:       day.recipeId,
      recipeName:     day.recipeName,
      isCustomName:   day.isCustomName,
      portions:       day.portions,
      note:           day.note || '',
      isSplit:        day.isSplit || false,
      customNameTobi: day.customNameTobi || '',
      customNameNora: day.customNameNora || '',
      portionsTobi:   day.portionsTobi,
      portionsNora:   day.portionsNora,
      isLocked:       mealPlan.indexOf(day) >= 0 ? lockedDays.has(mealPlan.indexOf(day)) : false,
    }));
    // isLocked korrekt per Index setzen
    mealPlan.forEach((day, idx) => { order[idx].isLocked = lockedDays.has(idx); });
    await apiCall('savePlan', { order: JSON.stringify(order) });
    showSuccess('Plan gespeichert ✓');
  } catch (err) {
    showError('Plan konnte nicht gespeichert werden.');
    console.error(err);
  } finally {
    if (btn) btn.disabled = false;
  }
}

// ── Shopping V2 (Produkte + Gerichte, bidirektional verknüpft) ─
async function loadShoppingList() {
  showToast("Lade Einkaufsliste...");
  try {
    const data = await apiCall("getShoppingListV2");
    shoppingItems = data.items || [];
    renderShoppingV2();
    hideToast();
  } catch (err) { showError("Einkaufsliste konnte nicht geladen werden."); }
}

// Kein Optimistic Update: die bidirektionale Verknüpfung (4 Fälle) wird server-seitig
// aufgelöst, daher einfacher Await-Roundtrip mit autoritativer Server-Antwort.
async function toggleShoppingEntry(kind, id, index) {
  showToast("Aktualisiere...");
  try {
    const params = { kind, id };
    if (index !== null && index !== undefined) params.index = index;
    const data = await apiCall("toggleShoppingEntry", params);
    shoppingItems = data.items || [];
    renderShoppingV2();
    hideToast();
  } catch (err) {
    showError("Konnte nicht aktualisiert werden.");
    console.error(err);
  }
}

function formatShoppingQty(qty, unit) {
  if (qty === null || qty === undefined) return "";
  const rounded = Math.round(qty * 10) / 10;
  return `${rounded}${unit ? " " + unit : ""}`;
}

function buildProductRow(product) {
  const wrap = document.createElement("div");
  wrap.className = "shop-group";

  let statusHtml;
  if (product.isDone) {
    statusHtml = `<span class="item-amount" style="color:var(--accent)">Erledigt</span>`;
  } else if (product.doneQty > 0) {
    statusHtml = `<span class="item-amount">${formatShoppingQty(product.openQty, product.displayUnit)} offen · ${formatShoppingQty(product.doneQty, product.displayUnit)} erledigt</span>`;
  } else {
    statusHtml = `<span class="item-amount">${formatShoppingQty(product.openQty, product.displayUnit)}</span>`;
  }

  const hasSub = product.sources.length > 0;
  const main = document.createElement("div");
  main.className = `shop-item ${product.isDone ? "done" : ""} ${hasSub ? "has-sub" : ""}`.trim();
  main.innerHTML = `<div class="check ${product.isDone ? "on" : ""}">${product.isDone ? "✓" : ""}</div><span class="item-name">${product.name}</span>${statusHtml}`;
  main.querySelector(".check").onclick = () => toggleShoppingEntry("product", product.id, null);
  wrap.appendChild(main);

  product.sources.forEach((source, i) => {
    const sub = document.createElement("div");
    sub.className = `shop-subitem ${source.done ? "done" : ""}`;
    sub.innerHTML = `<div class="check ${source.done ? "on" : ""}">${source.done ? "✓" : ""}</div><span class="item-name">${source.label}</span><span class="item-amount">${formatShoppingQty(source.qty, product.displayUnit)}</span>`;
    sub.querySelector(".check").onclick = () => toggleShoppingEntry("productSource", product.id, i);
    wrap.appendChild(sub);
  });

  return wrap;
}

function buildDishRow(dish) {
  const wrap = document.createElement("div");
  wrap.className = "shop-group";

  const hasSub = dish.ingredients.length > 0;
  const main = document.createElement("div");
  main.className = `shop-item ${dish.done ? "done" : ""} ${hasSub ? "has-sub" : ""}`.trim();
  const statusHtml = dish.done ? `<span class="item-amount" style="color:var(--accent)">Erledigt</span>` : "";
  main.innerHTML = `<div class="check ${dish.done ? "on" : ""}">${dish.done ? "✓" : ""}</div><span class="item-name">${dish.name}</span>${statusHtml}`;
  main.querySelector(".check").onclick = () => toggleShoppingEntry("dish", dish.id, null);
  wrap.appendChild(main);

  dish.ingredients.forEach((ing, i) => {
    const sub = document.createElement("div");
    sub.className = `shop-subitem ${ing.done ? "done" : ""}`;
    sub.innerHTML = `<div class="check ${ing.done ? "on" : ""}">${ing.done ? "✓" : ""}</div><span class="item-name">${ing.name}</span>`;
    sub.querySelector(".check").onclick = () => toggleShoppingEntry("dishIngredient", dish.id, i);
    wrap.appendChild(sub);
  });

  return wrap;
}

function renderShoppingV2() {
  const container = document.getElementById("shopping-list");
  container.innerHTML = "";

  const products = shoppingItems.filter(i => i.type === "product");
  const dishes   = shoppingItems.filter(i => i.type === "dish");

  if (!products.length && !dishes.length) {
    container.innerHTML = `<div class="empty"><span class="empty-icon">🛒</span>Einkaufsliste ist leer.<br>Füge über den 🛒-Button im Plan Zutaten hinzu.</div>`;
    return;
  }

  const byCat = new Map();
  products.forEach(p => { if (!byCat.has(p.category)) byCat.set(p.category, []); byCat.get(p.category).push(p); });
  byCat.forEach((items, cat) => {
    const h = document.createElement("div"); h.className = "cat-header"; h.textContent = cat;
    container.appendChild(h);
    items.forEach(product => container.appendChild(buildProductRow(product)));
  });

  if (dishes.length) {
    const h = document.createElement("div"); h.className = "cat-header"; h.textContent = "Gerichte";
    container.appendChild(h);
    dishes.forEach(dish => container.appendChild(buildDishRow(dish)));
  }
}

// ── Pantry ─────────────────────────────────────────────────────
async function loadPantry() {
  showToast("Lade Vorräte...");
  try {
    const data = await apiCall("getPantryItems");
    pantryItems = data.items || [];
    renderPantry();
    hideToast();
  } catch (err) { showError("Vorräte konnten nicht geladen werden."); }
}
function renderPantry() {
  const container = document.getElementById("pantry-list");
  container.innerHTML = "";
  if (!pantryItems.length) { container.innerHTML = `<div class="empty"><span class="empty-icon">📦</span>Noch keine Grundvorräte eingetragen.</div>`; return; }
  pantryItems.forEach(item => {
    const nextDate = item.nextPurchaseDate ? new Date(item.nextPurchaseDate).toLocaleDateString("de-DE", { day:"2-digit", month:"2-digit" }) : "—";
    const pillClass = item.isDueSoon ? (new Date(item.nextPurchaseDate) < new Date() ? "pill-needed" : "pill-soon") : "pill-ok";
    const pillLabel = { "pill-needed":"Kaufen!", "pill-soon":"Bald", "pill-ok":"OK" }[pillClass];
    const el = document.createElement("div");
    el.className = "pantry-item";
    el.innerHTML = `<div class="pantry-info"><div class="pantry-name">${item.productName}</div><div class="pantry-sub">Fällig: ${nextDate} · alle ${item.intervalDays} Tage</div></div><span class="status-pill ${pillClass}">${pillLabel}</span>`;
    container.appendChild(el);
  });
}

// ── Navigation ─────────────────────────────────────────────────
const loaded = { plan: false, shopping: false, pantry: false };
function switchTab(el) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  el.classList.add("active");
  const panel = el.dataset.panel;
  document.getElementById(`panel-${panel}`).classList.add("active");
  if (!loaded[panel]) {
    loaded[panel] = true;
    if (panel === "plan")     loadPlan();
    if (panel === "shopping") loadShoppingList();
    if (panel === "pantry")   loadPantry();
  }
}

loaded.plan = true;
loadPlan();
</script>
