<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Essensplaner</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
<style>
  /* ── Tokens ────────────────────────────────────────────── */
  :root {
    --bg:          #F7F7F5;
    --surface:     #FFFFFF;
    --surface-2:   #F0EFED;
    --border:      rgba(0,0,0,0.07);
    --text:        #1A1A18;
    --text-muted:  #7A7A74;
    --accent:      #3D7F4F;
    --accent-bg:   #EAF3EC;
    --accent-text: #2A5C37;
    --warn:        #C0541A;
    --warn-bg:     #FDF0E8;
    --rest-bg:     #F0EDF8;
    --rest-text:   #5B3F8A;
    --radius:      14px;
    --radius-sm:   9px;
    --tab-h:       56px;
    --status-h:    44px;
  }

  /* ── Reset ─────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    background: var(--bg);
    color: var(--text);
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── Tab Bar ────────────────────────────────────────────── */
  .tabs {
    display: flex;
    height: var(--tab-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    font-size: 10px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    letter-spacing: 0.3px;
    transition: color 0.15s, border-color 0.15s;
    user-select: none;
  }
  .tab .icon { font-size: 20px; line-height: 1; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── Status Bar ─────────────────────────────────────────── */
  .status-bar {
    height: 0;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 500;
    transition: height 0.2s ease, opacity 0.2s ease;
    opacity: 0;
  }
  .status-bar.visible {
    height: var(--status-h);
    opacity: 1;
  }
  .status-bar.loading { background: var(--accent-bg); color: var(--accent-text); }
  .status-bar.success { background: var(--accent-bg); color: var(--accent-text); }
  .status-bar.error   { background: var(--warn-bg);   color: var(--warn); }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid currentColor;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Panel ──────────────────────────────────────────────── */
  .panel { display: none; padding: 12px 12px 80px; }
  .panel.active { display: block; }

  /* ── Action Row ─────────────────────────────────────────── */
  .action-row {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .btn {
    flex: 1;
    height: 40px;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .btn:active { opacity: 0.75; }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-primary   { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--surface-2); color: var(--text); }

  /* ── Week Label ─────────────────────────────────────────── */
  .week-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    padding: 14px 2px 6px;
  }

  /* ── Day Card ───────────────────────────────────────────── */
  .day-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    margin-bottom: 7px;
    overflow: hidden;
  }
  .day-card.sortable-chosen { box-shadow: 0 6px 24px rgba(0,0,0,0.12); }
  .day-card.sortable-ghost  { opacity: 0.3; }

  .day-header {
    display: flex;
    align-items: center;
    padding: 8px 13px;
    border-bottom: 1px solid var(--border);
    gap: 7px;
  }
  .day-name  { font-size: 12px; font-weight: 600; color: var(--text-muted); min-width: 50px; }

  .badge {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    letter-spacing: 0.2px;
  }
  .badge-sunday  { background: #FDECEA; color: #B03A2E; }
  .badge-prep    { background: #E8F4FD; color: #1A6B9A; }
  .badge-reste   { background: var(--rest-bg); color: var(--rest-text); }
  .badge-weekend { background: var(--accent-bg); color: var(--accent-text); }

  .meal-row {
    display: flex;
    align-items: center;
    padding: 10px 13px;
    gap: 9px;
  }
  .drag-handle {
    color: var(--text-muted);
    opacity: 0.3;
    font-size: 17px;
    cursor: grab;
    flex-shrink: 0;
    touch-action: none;
    line-height: 1;
  }
  .meal-info    { flex: 1; min-width: 0; }
  .meal-name    { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .meal-sub     { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  .cat-pill {
    font-size: 10px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 20px;
    flex-shrink: 0;
    text-transform: capitalize;
  }
  .cat-nudeln     { background: #FDECEA; color: #8B2618; }
  .cat-reis       { background: #FEF5E4; color: #7D5108; }
  .cat-kartoffeln { background: var(--accent-bg); color: var(--accent-text); }
  .cat-fleisch    { background: #FDECEA; color: #922B21; }
  .cat-default    { background: var(--surface-2); color: var(--text-muted); }

  /* ── Stepper ─────────────────────────────────────────────── */
  .stepper { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
  .stepper-btn {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: var(--text);
    font-size: 17px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.12s;
    line-height: 1;
    flex-shrink: 0;
  }
  .stepper-btn:active { background: var(--border); }
  .stepper-val { font-size: 14px; font-weight: 600; min-width: 14px; text-align: center; }

  /* ── Shopping List ───────────────────────────────────────── */
  .cat-header {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-muted);
    padding: 14px 2px 6px;
  }
  .shop-item {
    display: flex;
    align-items: center;
    background: var(--surface);
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    padding: 11px 13px;
    margin-bottom: 6px;
    gap: 11px;
    transition: opacity 0.2s;
  }
  .shop-item.done { opacity: 0.38; }
  .shop-item.done .item-name { text-decoration: line-through; }

  .check {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    flex-shrink: 0;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    color: white;
    transition: background 0.15s, border-color 0.15s;
  }
  .check.on { background: var(--accent); border-color: var(--accent); }

  .item-name   { flex: 1; font-size: 15px; }
  .item-amount { font-size: 13px; color: var(--text-muted); font-weight: 500; white-space: nowrap; }

  /* ── Pantry ──────────────────────────────────────────────── */
  .pantry-item {
    display: flex;
    align-items: center;
    background: var(--surface);
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    padding: 12px 13px;
    margin-bottom: 6px;
    gap: 11px;
  }
  .pantry-emoji  { font-size: 22px; flex-shrink: 0; }
  .pantry-info   { flex: 1; }
  .pantry-name   { font-size: 15px; font-weight: 500; }
  .pantry-sub    { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  .status-pill {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .pill-ok     { background: var(--accent-bg);  color: var(--accent-text); }
  .pill-soon   { background: var(--warn-bg);    color: var(--warn); }
  .pill-needed { background: #FDECEA;            color: #8B2618; }

  /* ── Empty State ─────────────────────────────────────────── */
  .empty {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1.5;
  }
  .empty .empty-icon { font-size: 36px; margin-bottom: 12px; display: block; }
</style>
</head>
<body>

<!-- Tab Bar -->
<nav class="tabs">
  <div class="tab active" data-panel="plan" onclick="switchTab(this)">
    <span class="icon">📅</span>Plan
  </div>
  <div class="tab" data-panel="shopping" onclick="switchTab(this)">
    <span class="icon">🛒</span>Einkauf
  </div>
  <div class="tab" data-panel="pantry" onclick="switchTab(this)">
    <span class="icon">📦</span>Vorräte
  </div>
</nav>

<!-- Status Bar -->
<div class="status-bar" id="status-bar">
  <span class="spinner" id="status-spinner" style="display:none"></span>
  <span id="status-text"></span>
</div>

<!-- ═══════════ PLAN ═══════════ -->
<div id="panel-plan" class="panel active">
  <div class="action-row">
    <button class="btn btn-primary" onclick="generatePlan()" id="btn-generate">
      ✨ Neuer Plan
    </button>
    <button class="btn btn-secondary" onclick="confirmPlan()" id="btn-confirm">
      ✅ Bestätigen
    </button>
  </div>
  <div id="plan-list"></div>
</div>

<!-- ═══════════ SHOPPING ═══════════ -->
<div id="panel-shopping" class="panel">
  <div class="action-row">
    <button class="btn btn-secondary" onclick="loadShoppingList()" style="flex:0 0 40px; padding:0;">
      ↺
    </button>
    <button class="btn btn-primary" onclick="confirmPlan()" style="flex:1">
      ✅ Liste neu erstellen
    </button>
  </div>
  <div id="shopping-list"></div>
</div>

<!-- ═══════════ PANTRY ═══════════ -->
<div id="panel-pantry" class="panel">
  <div id="pantry-list"></div>
</div>

<script>
// ── Telegram WebApp ────────────────────────────────────────────
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
}

const API_URL    = "https://script.google.com/macros/s/AKfycby7ctVegsR8rC8CZMWS5iEOvEMORyVFvnPJOQXp1BdreB4tgn4TPRLyqqDYE87PqdqjZg/exec";
const INIT_DATA  = tg?.initData || "";
// TEMPORÄR:
if (tg) setTimeout(() => alert("initData leer: " + (INIT_DATA === "")), 1500);

// ── State ──────────────────────────────────────────────────────
let mealPlan      = [];
let shoppingItems = [];
let pantryItems   = [];

// ── API ────────────────────────────────────────────────────────
async function apiCall(action, extraParams = {}) {
  const params = new URLSearchParams({
    action,
    initData: INIT_DATA,
    ...extraParams,
  });

  const response = await fetch(`${API_URL}?${params.toString()}`);
  if (!response.ok) throw new Error(`HTTP ${response.status}`);

  const data = await response.json();
  if (data.error) throw new Error(data.error);

  return data;
}

// ── Status Bar ─────────────────────────────────────────────────
function showStatus(message, type = "loading") {
  const bar      = document.getElementById("status-bar");
  const text     = document.getElementById("status-text");
  const spinner  = document.getElementById("status-spinner");

  bar.className      = `status-bar visible ${type}`;
  text.textContent   = message;
  spinner.style.display = type === "loading" ? "block" : "none";
}

function hideStatus(delay = 0) {
  setTimeout(() => {
    document.getElementById("status-bar").className = "status-bar";
  }, delay);
}

function showSuccess(message) {
  showStatus(message, "success");
  hideStatus(2500);
}

function showError(message) {
  showStatus(message, "error");
  hideStatus(3500);
}

// ── Plan ───────────────────────────────────────────────────────
async function loadPlan() {
  showStatus("Lade Essensplan...");
  try {
    const data = await apiCall("getMealPlan");
    mealPlan   = data.mealPlan || [];
    renderPlan();
    hideStatus();
  } catch (err) {
    showError("Plan konnte nicht geladen werden.");
    console.error(err);
  }
}

async function generatePlan() {
  const btn = document.getElementById("btn-generate");
  btn.disabled = true;
  showStatus("Erstelle neuen Plan mit KI...");

  try {
    await apiCall("generatePlan");
    showStatus("Lade Plan...");
    const data = await apiCall("getMealPlan");
    mealPlan   = data.mealPlan || [];
    renderPlan();
    showSuccess("Neuer Plan erstellt ✓");
  } catch (err) {
    showError("Plan konnte nicht erstellt werden.");
    console.error(err);
  } finally {
    btn.disabled = false;
  }
}

async function confirmPlan() {
  const btn = document.getElementById("btn-confirm");
  btn.disabled = true;
  showStatus("Erstelle Einkaufsliste...");

  try {
    await apiCall("confirmPlan");
    const data     = await apiCall("getShoppingList");
    shoppingItems  = data.items || [];
    renderShopping();
    showSuccess("Einkaufsliste erstellt ✓");
    // Zum Einkaufs-Tab wechseln
    const shoppingTab = document.querySelector('[data-panel="shopping"]');
    switchTab(shoppingTab);
  } catch (err) {
    showError("Fehler beim Erstellen der Einkaufsliste.");
    console.error(err);
  } finally {
    btn.disabled = false;
  }
}

function renderPlan() {
  const container = document.getElementById("plan-list");
  container.innerHTML = "";

  if (!mealPlan.length) {
    container.innerHTML = `
      <div class="empty">
        <span class="empty-icon">🍽️</span>
        Noch kein Plan vorhanden.<br>Tippe auf „Neuer Plan" um zu starten.
      </div>`;
    return;
  }

  const DAYS = ["So","Mo","Di","Mi","Do","Fr","Sa"];

  mealPlan.forEach((day, idx) => {
    // Wochentrennlinie
    if (idx === 0 || idx === 7) {
      const wl = document.createElement("div");
      wl.className   = "week-label";
      wl.textContent = idx === 0 ? "Woche 1" : "Woche 2";
      container.appendChild(wl);
    }

    const date     = new Date(day.date);
    const dateStr  = `${String(date.getDate()).padStart(2,"0")}.${String(date.getMonth()+1).padStart(2,"0")}`;
    const dayName  = DAYS[day.dayOfWeek];

    // Badge
    let badgeHtml = "";
    if (day.dayOfWeek === 0)    badgeHtml = `<span class="badge badge-sunday">Fleisch</span>`;
    else if (day.isMealPrep)    badgeHtml = `<span class="badge badge-prep">Meal Prep</span>`;
    else if (day.isReste)       badgeHtml = `<span class="badge badge-reste">Reste</span>`;
    else if (day.dayOfWeek >= 5) badgeHtml = `<span class="badge badge-weekend">Wochenende</span>`;

    // Kategorie-Pill
    const tag      = (day.recipeTags || []).find(t =>
      ["nudeln","reis","kartoffeln","fleisch"].includes(t.toLowerCase())
    );
    const catClass = tag ? `cat-${tag.toLowerCase()}` : "cat-default";
    const catHtml  = tag ? `<span class="cat-pill ${catClass}">${tag}</span>` : "";

    const card = document.createElement("div");
    card.className  = "day-card";
    card.dataset.idx = idx;

    card.innerHTML = `
      <div class="day-header">
        <span class="day-name">${dayName} ${dateStr}</span>
        ${badgeHtml}
      </div>
      <div class="meal-row">
        <span class="drag-handle">⠿</span>
        <div class="meal-info">
          <div class="meal-name">${day.recipeName || "—"}</div>
          <div class="meal-sub">${day.isReste ? "Aufgewärmt" : (day.note || "")}</div>
        </div>
        ${catHtml}
        <div class="stepper">
          <button class="stepper-btn" onclick="changePax(${idx},-1)">−</button>
          <span class="stepper-val" id="pax-${idx}">${day.portions}</span>
          <button class="stepper-btn" onclick="changePax(${idx},+1)">+</button>
        </div>
      </div>`;

    container.appendChild(card);
  });

  // Drag & Drop
  new Sortable(container, {
    animation:   150,
    handle:      ".drag-handle",
    ghostClass:  "sortable-ghost",
    chosenClass: "sortable-chosen",
    filter:      ".week-label",
    onEnd(evt) {
      const moved = mealPlan.splice(evt.oldDraggableIndex, 1)[0];
      mealPlan.splice(evt.newDraggableIndex, 0, moved);
    },
  });
}

function changePax(idx, delta) {
  mealPlan[idx].portions = Math.max(1, Math.min(6, mealPlan[idx].portions + delta));
  document.getElementById(`pax-${idx}`).textContent = mealPlan[idx].portions;
}

// ── Shopping ───────────────────────────────────────────────────
async function loadShoppingList() {
  showStatus("Lade Einkaufsliste...");
  try {
    const data    = await apiCall("getShoppingList");
    shoppingItems = data.items || [];
    renderShopping();
    hideStatus();
  } catch (err) {
    showError("Einkaufsliste konnte nicht geladen werden.");
    console.error(err);
  }
}

async function toggleItem(index) {
  shoppingItems[index].done = !shoppingItems[index].done;
  renderShopping();

  try {
    await apiCall("toggleShoppingItem", { index });
  } catch (err) {
    // Rollback bei Fehler
    shoppingItems[index].done = !shoppingItems[index].done;
    renderShopping();
    showError("Konnte nicht gespeichert werden.");
    console.error(err);
  }
}

function renderShopping() {
  const container = document.getElementById("shopping-list");
  container.innerHTML = "";

  if (!shoppingItems.length) {
    container.innerHTML = `
      <div class="empty">
        <span class="empty-icon">🛒</span>
        Keine Einkaufsliste vorhanden.<br>Bestätige zuerst den Essensplan.
      </div>`;
    return;
  }

  const byCat = new Map();
  shoppingItems.forEach(item => {
    if (!byCat.has(item.category)) byCat.set(item.category, []);
    byCat.get(item.category).push(item);
  });

  byCat.forEach((items, cat) => {
    const header = document.createElement("div");
    header.className   = "cat-header";
    header.textContent = cat;
    container.appendChild(header);

    items.forEach(item => {
      const amount = item.amount !== null && item.amount !== undefined
        ? `${Math.round(item.amount * 10) / 10}${item.unit ? " " + item.unit : ""}`
        : "";

      const el = document.createElement("div");
      el.className = `shop-item ${item.done ? "done" : ""}`;
      el.innerHTML = `
        <div class="check ${item.done ? "on" : ""}" onclick="toggleItem(${item.index})">
          ${item.done ? "✓" : ""}
        </div>
        <span class="item-name">${item.productName}</span>
        <span class="item-amount">${amount}</span>`;
      container.appendChild(el);
    });
  });
}

// ── Pantry ─────────────────────────────────────────────────────
async function loadPantry() {
  showStatus("Lade Vorräte...");
  try {
    const data  = await apiCall("getPantryItems");
    pantryItems = data.items || [];
    renderPantry();
    hideStatus();
  } catch (err) {
    showError("Vorräte konnten nicht geladen werden.");
    console.error(err);
  }
}

function renderPantry() {
  const container = document.getElementById("pantry-list");
  container.innerHTML = "";

  if (!pantryItems.length) {
    container.innerHTML = `
      <div class="empty">
        <span class="empty-icon">📦</span>
        Noch keine Grundvorräte eingetragen.
      </div>`;
    return;
  }

  pantryItems.forEach(item => {
    const nextDate = item.nextPurchaseDate
      ? new Date(item.nextPurchaseDate).toLocaleDateString("de-DE", { day:"2-digit", month:"2-digit" })
      : "—";

    const pillClass = item.isDueSoon
      ? (new Date(item.nextPurchaseDate) < new Date() ? "pill-needed" : "pill-soon")
      : "pill-ok";
    const pillLabel = pillClass === "pill-needed" ? "Kaufen!"
                    : pillClass === "pill-soon"   ? "Bald fällig"
                    : "OK";

    const el = document.createElement("div");
    el.className = "pantry-item";
    el.innerHTML = `
      <span class="pantry-emoji">📦</span>
      <div class="pantry-info">
        <div class="pantry-name">${item.productName}</div>
        <div class="pantry-sub">Fällig: ${nextDate} · alle ${item.intervalDays} Tage</div>
      </div>
      <span class="status-pill ${pillClass}">${pillLabel}</span>`;
    container.appendChild(el);
  });
}

// ── Navigation ─────────────────────────────────────────────────
const loaded = { plan: false, shopping: false, pantry: false };

function switchTab(el) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  el.classList.add("active");
  const panel = el.dataset.panel;
  document.getElementById(`panel-${panel}`).classList.add("active");

  // Lazy load beim ersten Öffnen
  if (!loaded[panel]) {
    loaded[panel] = true;
    if (panel === "plan")     loadPlan();
    if (panel === "shopping") loadShoppingList();
    if (panel === "pantry")   loadPantry();
  }
}

// ── Init ───────────────────────────────────────────────────────
loaded.plan = true;
loadPlan();
</script>
</body>
</html>
